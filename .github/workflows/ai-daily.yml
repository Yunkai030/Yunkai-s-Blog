name: AI Daily Blog Publisher

on:
  schedule:
    # Runs every day at 09:00 Australia/Sydney during standard time.
    # GitHub Actions schedules are UTC, so adjust this if you want a fixed local time.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-daily-blog-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: .github/ai_daily/requirements-ai.txt

      - name: Install Python dependencies
        run: python -m pip install -r .github/ai_daily/requirements-ai.txt

      - name: Generate AI daily posts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          MAX_ARTICLES_PER_RUN: "5"
          ARTICLE_LOOKBACK_HOURS: "24"
        run: python .github/ai_daily/ai_daily.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Hexo dependencies
        run: npm ci

      - name: Validate Hexo build
        run: npm run build

      - name: Commit and push generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/_posts data/agent_seen_urls.sqlite3
          if git diff --cached --quiet; then
            echo "No new AI daily posts to publish."
          else
            git commit -m "Auto publish AI daily $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
